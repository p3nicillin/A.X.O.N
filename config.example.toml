# Copy to "config.toml" and edit. Every setting is optional; environment
# variables (AXON_<NAME>, and ANTHROPIC_API_KEY) override these.

# --- AI core ---------------------------------------------------------------
# A.X.O.N is FREE and LOCAL by default: intent parsing runs on a local LLM on
# your own machine, so no API key is required and no transcript leaves the
# device. The cloud (Claude) backend is OPTIONAL and OFF by default.
[ai]
engine = "local"             # auto | local | cloud | rules
fallback = ["local", "rules"]   # tried in order; rules is the guaranteed bottom
hybrid_fastpath = true       # match simple commands with rules, skip the LLM
warm_on_start = true         # preload the model at boot for a fast first command

[ai.local]
runtime = "ollama"           # ollama | llamacpp | openai_compatible
endpoint = "http://localhost:11434"
model = "llama3.2:3b"        # baseline 3B runs on almost anything; see README tiers
temperature = 0.1
keep_alive = "30m"
timeout_ms = 10000

[ai.cloud]
enabled = false              # opt-in only; a material privacy change when true
model = "claude-haiku-4-5-20251001"
# The API key is NEVER stored here. Set the ANTHROPIC_API_KEY environment
# variable, or store it in your OS credential manager (service "AXON",
# username "anthropic_api_key") via the optional `keyring` package.

# --- Speech to text ---------------------------------------------------------
# Path to an unpacked Vosk model. If empty, AXON auto-detects any model
# folder under ./models/ . See README "Speech-to-text setup".
stt_model_path = ""

# --- Voice activity detection ----------------------------------------------
vad_start_rms = 0.012    # raise if it triggers on background noise
vad_silence_ms = 800     # trailing silence that ends an utterance

# --- Wake word --------------------------------------------------------------
wake_word = "Axon"
require_wake_word = true  # ignore speech until "Axon" is heard
wake_preroll_ms = 1800    # in-memory audio replay prevents same-breath clipping

# --- In-app data ------------------------------------------------------------
weather_default_location = "London"  # used when no place is spoken

# --- Text to speech ---------------------------------------------------------
tts_rate = 178           # words per minute
tts_voice = "Hazel"      # British SAPI voice name substring

# --- Visual -----------------------------------------------------------------
window_width = 1100
window_height = 720
target_fps = 60

# --- Safety -----------------------------------------------------------------
confirm_sensitive = true # require spoken confirmation for sensitive skills

# --- Audit and local crash reports -----------------------------------------
audit_enabled = true
audit_retention_days = 90
crash_reporting_enabled = true  # local redacted JSON only; never uploaded
crash_retention_days = 30

# UI changes to voice/persona/backend are stored separately in
# data/user_settings.json. AXON_* environment variables remain authoritative.
